version: 2

updates:
  # GitHub Actions — keep action versions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  # npm — root + all workspaces
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - npm
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
