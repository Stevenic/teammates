name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.teammates/**'
      - 'template/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.teammates/**'
      - 'template/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/cli/node_modules
            packages/consolonia/node_modules
            packages/recall/node_modules
          key: modules-22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Register problem matchers
        run: |
          echo "::add-matcher::.github/matchers/biome-lint.json"
          echo "::add-matcher::.github/matchers/tsc.json"

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=high

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            packages/cli/node_modules
            packages/consolonia/node_modules
            packages/recall/node_modules
          key: modules-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build independent packages
        run: npm run build -w packages/consolonia & npm run build -w packages/recall & wait

      - name: Build CLI (depends on consolonia)
        run: npm run build -w packages/cli

      - name: Test all packages with coverage
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          for pkg in consolonia recall cli; do
            SUMMARY="packages/$pkg/coverage/coverage-summary.json"
            if [ -f "$SUMMARY" ]; then
              PCT=$(node -e "const s=JSON.parse(require('fs').readFileSync('$SUMMARY','utf8'));console.log(s.total.lines.pct)")
              echo "- **$pkg**: ${PCT}% lines" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
