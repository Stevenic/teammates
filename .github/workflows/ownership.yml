name: Ownership Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ownership-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ownership-map:
    name: Ownership Map
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run ownership check
        run: |
          chmod +x .github/scripts/check-ownership.sh
          echo "${{ steps.changed.outputs.files }}" | bash .github/scripts/check-ownership.sh
